name: hr_connect
description: "HR Connect App."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  
  # Style
  flutter_screenutil: ^5.9.3
  dropdown_button2: ^3.0.0

  # Local Storage
  shared_preferences: ^2.5.5

  # Wrapper
  provider: ^6.1.5+1
  path_provider: ^2.1.5

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0

  # Localization 
  intl: ^0.20.2

  # File
  pdf: ^3.12.0
  printing: ^5.14.3
  open_file: ^3.5.11

  # Connection
  connectivity_plus: ^7.0.0
  url_launcher: ^6.3.2
  get_it: ^9.2.1
  go_router: ^17.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo_icon.png"
  min_sdk_android: 21