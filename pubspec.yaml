name: hr_connect
description: "HR-Connect is a modern human resources management system designed to streamline corporate operations. Ensuring that every HR workflow from daily operations remains efficient, secure, and centralized."
publish_to: "none"
version: 1.0.1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Style
  flutter_screenutil: ^5.9.3
  google_fonts: ^8.1.0

  # Local Storage
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^8.1.0

  # Wrapper
  provider: ^6.1.5+1
  path_provider: ^2.1.5

  # Localization
  intl: ^0.20.2

  # Utils
  logger: ^2.7.0
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0
  fpdart: ^1.2.0
  flutter_dotenv: ^6.0.1
  package_info_plus: ^10.1.0

  # Connection
  connectivity_plus: ^7.0.0
  url_launcher: ^6.3.2
  go_router: ^17.1.0
  dio: ^5.9.2
  cached_network_image: ^3.4.1
  flutter_riverpod: ^3.3.1

  # Scanner
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.13.1
  freezed: ^3.2.5
  json_serializable: ^6.13.1
  mocktail: ^1.0.5

flutter:
  uses-material-design: true

  assets:
    - assets/logo/
    - .env
