name: hr_connect
description: "HR-Connect is a modern human resources management system designed to streamline corporate operations. Ensuring that every HR workflow from daily operations remains efficient, secure, and centralized."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Style
  flutter_screenutil: ^5.9.3
  dropdown_button2: ^3.0.0
  flex_color_scheme: ^8.4.0
  google_fonts: ^8.0.2

  # Local Storage
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0

  # Wrapper
  provider: ^6.1.5+1
  path_provider: ^2.1.5

  # Localization
  intl: ^0.20.2

  # File
  pdf: ^3.12.0
  printing: ^5.14.3
  open_file: ^3.5.11

  # Utils
  logger: ^2.7.0
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0
  fpdart: ^1.2.0
  flutter_dotenv: ^6.0.0
  package_info_plus: ^9.0.1

  # Connection
  connectivity_plus: ^7.0.0
  url_launcher: ^6.3.2
  get_it: ^9.2.1
  go_router: ^17.1.0
  dio: ^5.9.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  build_runner: ^2.13.1
  freezed: ^3.2.5
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - .env
